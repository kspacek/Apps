<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDT s.r.o. — Apps</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2a;
            --text: #e8e6f0;
            --muted: #6b6880;
            --accent: #c4956a;
            --accent-glow: rgba(196, 149, 106, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .grain {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
        }

        .glow-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            top: -200px;
            right: -100px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px 60px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 6vw, 52px);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.1s forwards;
        }

        .subtitle {
            font-size: 17px;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 64px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.2s forwards;
        }

        .section-label {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.3s forwards;
        }

        .app-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 24px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.4s forwards;
        }

        .app-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(196, 149, 106, 0.08);
        }

        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }

        .app-icon.cupweigh {
            background: linear-gradient(135deg, #5c3d1a, #a06c2a);
        }

        .app-info h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .app-info p {
            font-size: 14px;
            color: var(--muted);
            font-weight: 300;
        }

        .app-links {
            margin-left: auto;
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        .app-links a {
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid rgba(196, 149, 106, 0.3);
            border-radius: 8px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .app-links a:hover {
            background: rgba(196, 149, 106, 0.1);
            border-color: var(--accent);
        }

        .footer {
            margin-top: 80px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted);
            font-weight: 300;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.5s forwards;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 560px) {
            .app-card { flex-wrap: wrap; padding: 24px; }
            .app-links { margin-left: 0; margin-top: 8px; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <div class="logo">UDT s.r.o.</div>

        <h1>Apps & Privacy</h1>
        <p class="subtitle">
            Privacy policies and legal information for all our apps.
            Each app respects your data — most work entirely offline with zero data collection.
        </p>

        <div class="section-label">Applications</div>

        <div class="app-card">
            <div class="app-icon cupweigh">☕</div>
            <div class="app-info">
                <h3>CupWeigh</h3>
                <p>Kitchen cup-to-weight converter for baking</p>
            </div>
            <div class="app-links">
                <a href="cupweigh/">Privacy Policy</a>
            </div>
        </div>

        <!-- Future apps: copy the app-card block and adjust -->

        <div class="footer">
            &copy; 2026 UDT s.r.o. &middot; <a href="https://github.com/kspacek">GitHub</a>
        </div>
    </div>
</body>
</html>
